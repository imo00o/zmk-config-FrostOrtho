# 基本設定
CONFIG_ZMK_KEYBOARD_NAME="FrostOrtho"
CONFIG_ZMK_POINTING=y
CONFIG_ZMK_POINTING_SMOOTH_SCROLLING=y
CONFIG_NFCT_PINS_AS_GPIOS=y
CONFIG_ZMK_BLE=y
CONFIG_SPI=y
CONFIG_INPUT=y

# PMW3610
CONFIG_PMW3610=y
CONFIG_PMW3610_POLLING_RATE_125=y

# スクロール
CONFIG_PMW3610_SCROLL_TICK=16

# センサーの向き
CONFIG_PMW3610_ORIENTATION_90=y

# カーソル移動
CONFIG_PMW3610_CPI=900
CONFIG_PMW3610_CPI_DIVIDOR=1

# オートマウスレイヤー
CONFIG_PMW3610_AUTOMOUSE_TIMEOUT_MS=100000

# 低電力モード設定
CONFIG_PMW3610_RUN_DOWNSHIFT_TIME_MS=3000
CONFIG_PMW3610_SMART_ALGORITHM=y
CONFIG_PMW3610_REST1_SAMPLE_TIME_MS=20

# Battery
CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_HIGH=30
CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_CRITICAL=10

CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
CONFIG_BT_BAS=y

# Bluetooth接続設定
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=6
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=12

# Prospector設定
CONFIG_ZMK_STATUS_ADVERTISEMENT=y
CONFIG_ZMK_STATUS_ADV_KEYBOARD_NAME="FrostOrtho"

CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y

CONFIG_ZMK_STATUS_ADV_ACTIVITY_BASED=y
CONFIG_ZMK_STATUS_ADV_ACTIVE_INTERVAL_MS=200
CONFIG_ZMK_STATUS_ADV_IDLE_INTERVAL_MS=10000
CONFIG_ZMK_STATUS_ADV_ACTIVITY_TIMEOUT_MS=120000

CONFIG_PROSPECTOR_MAX_LAYERS=7
